<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book: Discovery Call | MeetWhen - Neo-Brutalist</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #00D4AA;
            --tertiary: #7C3AED;
            --black: #000000;
            --white: #FFFFFF;
            --cream: #FFF8F0;
            --gray: #666666;
            --light-gray: #F5F5F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--cream);
            color: var(--black);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Nav */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--black);
            text-decoration: none;
            font-weight: 600;
            padding: 12px 20px;
            border: 3px solid var(--black);
            background: var(--white);
            transition: all 0.1s;
        }

        .back-link:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .back-link svg {
            width: 20px;
            height: 20px;
        }

        .steps {
            display: flex;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .step {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--black);
            background: var(--white);
            font-weight: 700;
        }

        .step.active {
            background: var(--secondary);
        }

        .step.completed {
            background: var(--black);
            color: var(--white);
        }

        /* Main layout */
        .booking-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--black);
            color: var(--white);
            padding: 32px;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: var(--secondary);
        }

        .sidebar-avatar {
            width: 64px;
            height: 64px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .sidebar-host {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .sidebar-title {
            font-size: 1.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .sidebar-meta {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .meta-item svg {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }

        .meta-item.highlight {
            background: var(--secondary);
            color: var(--black);
            padding: 16px;
            margin: 8px -32px;
            padding-left: 32px;
        }

        .meta-item.highlight svg {
            opacity: 1;
        }

        /* Main content */
        .main-content {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 32px;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            color: var(--gray);
        }

        /* Calendar */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-month {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .nav-btns {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            border: 3px solid var(--black);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .nav-btn:hover {
            background: var(--secondary);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 32px;
        }

        .weekday {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 12px 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray);
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
            position: relative;
        }

        .day:hover:not(.disabled):not(.selected) {
            border-color: var(--black);
            background: var(--light-gray);
        }

        .day.disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .day.available::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: var(--secondary);
        }

        .day.selected {
            background: var(--secondary);
            border-color: var(--black);
        }

        .day.selected::after {
            display: none;
        }

        .day.today:not(.selected) {
            border: 3px solid var(--black);
        }

        /* Time slots */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .time-slot {
            padding: 16px;
            text-align: center;
            border: 3px solid var(--black);
            background: var(--white);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }

        .time-slot:hover {
            background: var(--cream);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .time-slot.selected {
            background: var(--primary);
            color: var(--white);
        }

        /* CTA */
        .cta-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 4px solid var(--black);
            display: flex;
            justify-content: flex-end;
        }

        .cta-btn {
            padding: 18px 48px;
            background: var(--secondary);
            color: var(--black);
            border: 4px solid var(--black);
            font-size: 1rem;
            font-weight: 800;
            font-family: inherit;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .cta-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 8px 8px 0 var(--black);
        }

        .cta-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Mobile */
        @media (max-width: 900px) {
            .booking-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding: 24px;
            }

            .sidebar::after {
                width: 40px;
                height: 40px;
            }

            .meta-item.highlight {
                margin: 8px -24px;
                padding-left: 24px;
            }

            .time-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .time-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .calendar-month {
                font-size: 1.25rem;
            }

            .cta-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
