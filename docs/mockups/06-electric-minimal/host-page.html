<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah Chen | MeetWhen - Electric Minimal Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric: #00FF88;
            --electric-dim: #00CC6A;
            --black: #000000;
            --near-black: #0A0A0A;
            --dark: #171717;
            --gray-dark: #262626;
            --gray: #525252;
            --gray-light: #A3A3A3;
            --white: #FAFAFA;
            --pure-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--pure-white);
            color: var(--near-black);
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 100px 24px;
        }

        /* Header */
        .profile-header {
            margin-bottom: 64px;
        }

        .avatar-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: var(--near-black);
            color: var(--white);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--white);
            border: 1px solid #E5E5E5;
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--electric);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--electric);
        }

        .profile-name {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .profile-role {
            font-size: 1.15rem;
            color: var(--gray);
        }

        .profile-role span {
            color: var(--near-black);
            font-weight: 600;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, #E5E5E5 0%, transparent 100%);
            margin: 48px 0;
        }

        /* Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-light);
        }

        /* Meeting list */
        .meetings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .meeting-item {
            display: flex;
            align-items: center;
            padding: 24px;
            background: var(--white);
            border: 1px solid #E5E5E5;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .meeting-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--electric);
            transition: width 0.2s;
        }

        .meeting-item:hover {
            border-color: var(--near-black);
            transform: translateX(4px);
        }

        .meeting-item:hover::before {
            width: 4px;
        }

        .meeting-icon {
            width: 48px;
            height: 48px;
            background: var(--near-black);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .meeting-icon svg {
            width: 24px;
            height: 24px;
            color: var(--electric);
        }

        .meeting-content {
            flex: 1;
        }

        .meeting-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 4px;
        }

        .meeting-title {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .meeting-duration {
            font-family: 'Geist Mono', monospace;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .meeting-description {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .meeting-arrow {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-light);
            transition: all 0.2s;
        }

        .meeting-item:hover .meeting-arrow {
            color: var(--near-black);
            transform: translateX(4px);
        }

        .meeting-arrow svg {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        .footer {
            margin-top: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--gray-light);
        }

        .footer a {
            color: var(--near-black);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .timezone {
            font-family: 'Geist Mono', monospace;
            font-size: 0.8rem;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .container {
                padding: 60px 20px;
            }

            .profile-name {
                font-size: 2rem;
            }

            .meeting-item {
                flex-wrap: wrap;
            }

            .meeting-arrow {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="profile-header">
            <div class="avatar-row">
                <div class="avatar">SC</div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Available now
                </div>
            </div>
            <h1 class="profile-name">Sarah Chen</h1>
            <p class="profile-role">Product Lead at <span>TechCorp</span></p>
        </header>

        <div class="divider"></div>

        <div class="section-header">
            <span class="section-title">Book a meeting</span>
        </div>

        <div class="meetings-list">
            <div class="meeting-item">
                <div class="meeting-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <div class="meeting-content">
                    <div class="meeting-header">
                        <h3 class="meeting-title">Quick Sync</h3>
                        <span class="meeting-duration">15 min</span>
                    </div>
                    <p class="meeting-description">Fast check-in for quick questions</p>
                </div>
                <div class="meeting-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>

            <div class="meeting-item">
                <div class="meeting-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div class="meeting-content">
                    <div class="meeting-header">
                        <h3 class="meeting-title">Discovery Call</h3>
                        <span class="meeting-duration">30 min</span>
                    </div>
                    <p class="meeting-description">Explore how we can work together</p>
                </div>
                <div class="meeting-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>

            <div class="meeting-item">
                <div class="meeting-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                </div>
                <div class="meeting-content">
                    <div class="meeting-header">
                        <h3 class="meeting-title">Deep Dive Session</h3>
                        <span class="meeting-duration">60 min</span>
                    </div>
                    <p class="meeting-description">In-depth strategy discussion</p>
                </div>
                <div class="meeting-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>
        </div>

        <footer class="footer">
            <span>Powered by <a href="#">MeetWhen</a></span>
            <span class="timezone">UTC-8 (Pacific)</span>
        </footer>
    </div>
</body>
</html>
