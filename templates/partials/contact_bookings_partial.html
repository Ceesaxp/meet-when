{{define "contact_bookings_partial.html"}}
<td colspan="4" style="padding: 0;">
    <div style="padding: 1rem 1.5rem; background: var(--bg-secondary);">
        {{if .Bookings}}
        <table class="table" style="margin: 0; font-size: 0.875rem;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Template</th>
                    <th>Status</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody>
                {{range .Bookings}}
                <tr>
                    <td>{{formatDate .Booking.StartTime}}</td>
                    <td>{{.TemplateName}}</td>
                    <td><span class="badge badge-{{.Booking.Status}}">{{.Booking.Status}}</span></td>
                    <td>{{.Booking.Duration}} min</td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <p style="color: var(--text-muted); margin: 0;">No bookings found for this contact.</p>
        {{end}}
    </div>
</td>
{{end}}
