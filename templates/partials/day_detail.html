{{define "day_detail.html"}}
<div class="event-list">
    {{if .Events}}
    {{range .Events}}
    <div class="event-row" style="--cal-color: {{.CalendarColor}}; margin-bottom: 12px;">
        <div style="display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px;">
            {{if .IsAllDay}}
            <span class="badge" style="font-size: 0.7rem;">All Day</span>
            {{else}}
            <span style="font-size: 0.8rem; color: var(--gray-500); white-space: nowrap;">
                {{formatTime .Start}}–{{formatTime .End}}
            </span>
            {{end}}
            <strong style="font-size: 0.9rem;">{{.Title}}</strong>
        </div>
        <div style="font-size: 0.75rem; color: var(--gray-500);">
            {{.CalendarName}}
            {{if not .IsAllDay}}
            &middot; {{duration .Start .End}}
            {{end}}
        </div>
    </div>
    {{end}}
    {{else}}
    <p style="color: var(--gray-500); font-size: 0.875rem;">No events.</p>
    {{end}}
</div>
{{end}}
